<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>autoGymglish</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="risk-rail" id="risk-rail" aria-hidden="true"></div>

  <header class="brand">
    <div class="brand-mark">
      <span class="brand-tag">ext</span>
      <h1>auto<em>Gymglish</em></h1>
    </div>
    <p id="status" class="brand-status">Ready</p>
  </header>

  <section class="card card-detect">
    <div class="card-head">
      <span class="card-num">01</span>
      <span class="card-title">Detect</span>
    </div>
    <button id="detect" class="btn btn-ghost">Scan page → console</button>
    <div id="result" class="data-block"></div>
  </section>

  <section class="card card-solve">
    <div class="card-head">
      <span class="card-num">02</span>
      <span class="card-title">Provider</span>
    </div>
    <div class="row">
      <label for="provider-select" class="row-label">LLM</label>
      <select id="provider-select" class="select"></select>
    </div>
    <div class="row row-actions">
      <button id="solve-test" class="btn btn-ghost">Solve · dry-run</button>
      <button id="open-settings" type="button" class="btn btn-icon" title="Settings">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </div>
    <div id="solve-result" class="data-block"></div>
  </section>

  <section class="card card-fill">
    <div class="card-head">
      <span class="card-num">03</span>
      <span class="card-title">Solve &amp; Fill</span>
      <span class="card-tag" id="risk-tag">honest</span>
    </div>

    <div class="accuracy">
      <div class="accuracy-head">
        <label for="accuracy-slider" class="row-label">Target accuracy</label>
        <span id="accuracy-value" class="accuracy-value">100%</span>
      </div>
      <input type="range" id="accuracy-slider" min="0" max="100" value="100" step="5" class="slider" />
      <div class="accuracy-scale" aria-hidden="true">
        <span>sloppy</span>
        <span>plausible</span>
        <span>honest</span>
      </div>
    </div>

    <button id="solve-and-fill" class="btn btn-primary">
      <span class="btn-label">Solve &amp; Fill</span>
      <span class="btn-arrow" aria-hidden="true">→</span>
    </button>

    <div id="fill-progress" class="fill-progress" hidden>
      <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
      <p id="fill-status" class="progress-text">0 / 0 exercises filled</p>
      <p id="audio-counter" class="progress-sub">0 audio exercises skipped</p>
      <div class="row row-actions row-actions-fill">
        <button id="skip-wait" type="button" class="btn btn-ghost">Skip wait</button>
        <button id="stop-fill" type="button" class="btn btn-danger">Stop</button>
      </div>
    </div>
  </section>

  <footer class="foot">
    <span class="foot-dot" aria-hidden="true">●</span>
    <span>Manual submit only — never auto-sends</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
